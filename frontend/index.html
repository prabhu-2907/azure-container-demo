<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Azure Multi-Container Demo</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 20px; max-width: 700px; }
      button { padding: 10px 16px; border-radius: 10px; border: 0; cursor: pointer; }
      pre { background: #f6f6f6; padding: 12px; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>✅ Azure Multi-Container App (ACI Container Group)</h2>
      <p>This frontend calls the API container endpoint <code>/hit</code>.</p>
      <button onclick="callApi()">Call API</button>
      <pre id="out">Click the button to test...</pre>
    </div>

    <script>
      async function callApi() {
        const out = document.getElementById("out");
        out.textContent = "Calling API...";
        try {
          // Since frontend & api are in same container group network,
          // we can use container name "api" to reach it.
          const res = await fetch("http://api:5000/hit");
          const data = await res.json();
          out.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
          out.textContent = "Error: " + e;
        }
      }
    </script>
  </body>
</html>
